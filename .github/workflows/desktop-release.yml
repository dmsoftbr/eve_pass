name: Desktop Release

# Builds signed EVEPass desktop installers for macOS (universal), Windows and
# Linux, and publishes them to a GitHub Release. Triggered by pushing a version
# tag (e.g. `v0.1.0`) or manually.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY   — baked into the frontend at build
#   # macOS signing + notarization (optional but needed for frictionless installs):
#   APPLE_CERTIFICATE            — base64 of your Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD   — password for that .p12
#   APPLE_SIGNING_IDENTITY       — e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID, APPLE_PASSWORD     — Apple ID + app-specific password (notarization)
#   APPLE_TEAM_ID                — your Apple Developer team id
#   # Auto-updater signing (optional; see docs/DISTRIBUTION.md):
#   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: universal (Intel + Apple Silicon), assinado + notarizado via os
          # secrets APPLE_* (já configurados). Runner macOS custa ~10x os minutos.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          # apple targets p/ o build universal do macOS (inócuo nos outros runners)
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Frontend config (baked into the bundle):
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # macOS signing + notarization (no-ops if the secrets are unset):
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing (optional):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'EVEPass ${{ github.ref_name }}'
          releaseBody: 'Instaladores gerados automaticamente. Veja os assets abaixo.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # O tauri-action notariza o .app, mas não o .dmg em si. Sem isso o dmg
      # baixado dispara o Gatekeeper. Notariza+staple o dmg e re-sobe (clobber).
      - name: Notarize + staple the DMG (macOS)
        if: matrix.platform == 'macos-latest' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG=$(find apps/desktop/src-tauri/target -name '*.dmg' | head -1)
          echo "Notarizing $DMG"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber \
            --repo "${{ github.repository }}"

  # Builda o APK Android (core Rust via UBRN/cargo-ndk + assembleRelease assinado
  # com o keystore de release) e anexa ao mesmo release. Roda após o desktop pra
  # o release (rascunho) já existir.
  android:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (yarn 4)
        run: corepack enable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: sdkmanager "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install JS deps (yarn workspace)
        working-directory: apps/mobile/react-native-evepass-core
        run: yarn install --immutable

      - name: Build core + bindings + .so (UBRN)
        working-directory: apps/mobile/react-native-evepass-core
        run: ./node_modules/.bin/ubrn build android --config ubrn.config.yaml

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Assemble release APK (assinado)
        working-directory: apps/mobile/react-native-evepass-core/example/android
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK ao release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          SRC=apps/mobile/react-native-evepass-core/example/android/app/build/outputs/apk/release/app-release.apk
          cp "$SRC" "EVEPass_${V}_android.apk"
          gh release upload "$GITHUB_REF_NAME" "EVEPass_${V}_android.apk" --clobber \
            --repo "$GITHUB_REPOSITORY"
